id = "6df5ef7d-bd72-4a4f-8d44-699ce82f2d36"
cli_version = "0.6.10"
app_name = "dice-roll-node-app"
modules_path = "src/modules"
app_description = "getting started with a dice roll app, database required for setup"
linter = "eslint"
formatter = "prettier"
validator = "zod"
http_framework = "express"
runtime = "node"
test_framework = "vitest"
author = "SRTd Solutions"
license = "MIT"
platform_application_id = "88dad829-dd7d-47fc-9508-94b6dd421905"
platform_organization_id = "78e19bc1-0427-47f0-a9a8-0bd4b7f0cd54"

[[projects]]
type = "Library"
name = "core"
description = "Core library for dice-roll-node-app, containing shared foundational infrastrucuture and utilities"

[[projects]]
type = "Library"
name = "monitoring"
description = "Monitoring library for dice-roll-node-app, defining metrics, logs, and trace building blocks"

[[projects]]
type = "Library"
name = "universal-sdk"
description = "Universal SDK for dice-roll-node-app, containing shared foundational infrastrucuture and utilities"

[[projects]]
type = "Service"
name = "roll-dice-svc"
description = "dice roller"
routers = [
    "roll-dice-svc",
    "dice-rtr",
]

[projects.resources]
database = "postgresql"

[project_peer_topology]
dice-roll-node-app = [
    "core",
    "monitoring",
    "universal-sdk",
    "roll-dice-svc",
]
